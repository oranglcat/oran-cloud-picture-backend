server:
  port: 8123
  servlet:
    context-path: /api  #上下文路径
spring:
  application:
    name: oran-picture-backend
    #数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oran_picture
    username: root
    password: 1234
  servlet:
    ##开放更大的文件上传体积，否则SpringMVC会在上传文件时抛出异常
    multipart:
      max-file-size: 10MB
  profiles:
    active: local

mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete  #全局逻辑删除的字段名
      logic-delete-value: 1 # 逻辑已删除值
      logic-not-delete-value: 0  # 逻辑未删除值